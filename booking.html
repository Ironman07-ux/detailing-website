<!DOCTYPE html>
<html>
<head>
<title>Booking</title>

<style>
body {
    background: #0d0d0d;
    color: white;
    font-family: Arial;
    text-align: center;
}

form {
    margin-top: 50px;
}

input, select {
    padding: 10px;
    margin: 10px;
    width: 250px;
}

button {
    background: red;
    color: white;
    padding: 10px 20px;
    border: none;
}
</style>
</head>

<body>

<h1>Book an Appointment</h1>

<form>
    <input type="text" placeholder="Your Name" required><br>
    <input type="email" placeholder="Email" required><br>
    <input type="date" required><br>

    <select>
        <option>Exterior Wash</option>
        <option>Interior Cleaning</option>
        <option>Full Detail</option>
    </select><br>

    <button type="submit">Submit</button>
</form>

<p>⚠️ Booking system will be connected later</p>

</body>
</html>
